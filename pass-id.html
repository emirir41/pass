<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pass by Highly — Giri&#351;</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --yellow:#FAD94F;
  --yellow-dim:#F5C800;
  --purple:#5B1DB8;
  --purple-light:#7C3AED;
  --purple-deep:#3B0D8A;
  --white:#FFFFFF;
  --text-on-yellow:#3B0D8A;
  --muted:rgba(59,13,138,0.55);
  --border:rgba(91,29,184,0.15);
  --border2:rgba(91,29,184,0.25);
  --error:#dc2626;
  --success:#16a34a;
}

html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  background-color:var(--yellow);
  color:var(--text-on-yellow);
  overflow-x:hidden;
}

/* ── AMBIENT BG ── */
.bg-blob{
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.18;
  pointer-events:none;
  z-index:0;
}
.blob-1{width:500px;height:500px;background:var(--purple);top:-150px;right:-100px;animation:drift 12s ease-in-out infinite alternate;}
.blob-2{width:350px;height:350px;background:var(--purple-deep);bottom:-80px;left:-80px;animation:drift 16s ease-in-out infinite alternate-reverse;}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.08)}}

.deco-star{position:fixed;color:var(--purple);opacity:0.07;pointer-events:none;animation:slow-spin 20s linear infinite;}
.deco-star:nth-child(1){top:8%;left:6%;font-size:40px;animation-duration:14s;}
.deco-star:nth-child(2){top:15%;right:10%;font-size:80px;animation-duration:22s;animation-direction:reverse;}
.deco-star:nth-child(3){bottom:18%;right:7%;font-size:50px;animation-duration:18s;}
.deco-star:nth-child(4){bottom:10%;left:12%;font-size:30px;animation-duration:12s;animation-direction:reverse;}
@keyframes slow-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── LAYOUT ── */
.page{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 24px 60px;
}

/* ── CARD ── */
.card{
  background:rgba(255,255,255,0.92);
  border:2px solid rgba(91,29,184,0.18);
  border-radius:28px;
  width:440px;
  max-width:calc(100vw - 32px);
  backdrop-filter:blur(20px);
  box-shadow:0 8px 60px rgba(91,29,184,0.22),0 2px 0 rgba(91,29,184,0.1);
  animation:slideUp .5s cubic-bezier(.16,1,.3,1) both;
  overflow:hidden;
}
@keyframes slideUp{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}

.card-top{height:5px;background:linear-gradient(90deg,var(--purple-deep),var(--purple),var(--purple-light));}
.card-inner{padding:36px 36px 32px;}

/* ── LOGO ── */
.logo-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:6px;
}
.logo-text{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:36px;
  color:var(--purple);
  letter-spacing:-1px;
  line-height:1;
}
.logo-star{
  font-size:30px;
  color:var(--purple);
  line-height:1;
  animation:pulse-star 3s ease-in-out infinite;
}
@keyframes pulse-star{
  0%,100%{transform:scale(1) rotate(0deg);opacity:1}
  50%{transform:scale(1.15) rotate(15deg);opacity:0.85}
}
.logo-sub{
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:lowercase;
  color:var(--purple);
  opacity:0.6;
  text-align:center;
  margin-bottom:24px;
}

/* ── BADGE (logged in) ── */
.badge-wrap{
  display:none;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:12px;
  animation:fadeIn .5s ease;
}
.badge-wrap.show{display:flex;}
.badge-av{
  width:76px;
  height:76px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--purple-light));
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne',sans-serif;
  font-size:30px;
  font-weight:800;
  color:var(--yellow);
  box-shadow:0 0 0 4px rgba(91,29,184,0.15),0 8px 32px rgba(91,29,184,0.25);
}
.badge-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--purple);}
.badge-email{font-size:13px;color:var(--muted);}
.badge-chip{
  background:rgba(91,29,184,0.1);
  border:1.5px solid rgba(91,29,184,0.2);
  color:var(--purple);
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  padding:5px 14px;
  border-radius:999px;
  text-transform:uppercase;
  font-family:'Syne',sans-serif;
}
.badge-btns{display:flex;flex-direction:column;gap:8px;width:100%;}
.btn-dash{
  width:100%;
  padding:13px;
  background:var(--purple);
  border:none;
  border-radius:13px;
  color:var(--yellow);
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  display:block;
  text-align:center;
  transition:background .2s;
}
.btn-dash:hover{background:var(--purple-deep);}
.btn-out{
  width:100%;
  padding:11px;
  background:rgba(220,38,38,0.06);
  border:1.5px solid rgba(220,38,38,0.2);
  border-radius:12px;
  color:#dc2626;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  cursor:pointer;
  transition:background .2s;
}
.btn-out:hover{background:rgba(220,38,38,0.12);}

/* ── TABS ── */
.tabs{
  display:flex;
  gap:4px;
  background:rgba(91,29,184,0.07);
  border-radius:13px;
  padding:4px;
  margin-bottom:22px;
}
.tab{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:var(--muted);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:600;
  border-radius:10px;
  cursor:pointer;
  transition:all .25s;
}
.tab.active{
  background:var(--purple);
  color:var(--yellow);
  box-shadow:0 4px 14px rgba(91,29,184,0.3);
}

/* ── FORMS ── */
.form{display:none;flex-direction:column;gap:14px;}
.form.active{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.field{display:flex;flex-direction:column;gap:6px;}
.field label{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  letter-spacing:.8px;
  text-transform:uppercase;
}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:15px;
  pointer-events:none;
}
.field input{
  width:100%;
  background:rgba(91,29,184,0.05);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px 16px 13px 42px;
  color:var(--purple-deep);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(91,29,184,0.12);
  background:rgba(91,29,184,0.04);
}
.field input::placeholder{color:rgba(59,13,138,0.35);}
.eye-btn{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:15px;
  padding:4px;
  line-height:1;
}

/* Strength bar */
.strength-bar{display:flex;gap:4px;margin-top:6px;}
.strength-bar span{flex:1;height:3px;border-radius:3px;background:rgba(91,29,184,0.1);transition:background .3s;}
.sb-weak{background:#dc2626!important;}
.sb-med{background:#d97706!important;}
.sb-strong{background:#16a34a!important;}
.strength-lbl{font-size:11px;margin-top:4px;}

/* Terms */
.terms-box{
  background:rgba(91,29,184,0.05);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px;
}
.terms-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.terms-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--purple);flex-shrink:0;margin-top:2px;cursor:pointer;}
.terms-txt{font-size:13px;color:var(--muted);line-height:1.5;}
.terms-txt a{color:var(--purple);text-decoration:none;font-weight:600;}
.terms-txt a:hover{text-decoration:underline;}
.terms-err{font-size:11px;color:var(--error);margin-top:7px;display:none;padding-left:26px;}
.terms-err.show{display:block;}

/* Button */
.btn{
  width:100%;
  padding:14px;
  background:var(--purple);
  border:none;
  border-radius:13px;
  color:var(--yellow);
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:800;
  letter-spacing:.3px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .15s,box-shadow .15s,background .2s;
  margin-top:2px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(91,29,184,0.35);background:var(--purple-deep);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,0.08),transparent);}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(250,217,79,0.4);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:2px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

/* Google btn */
.btn-google{
  width:100%;
  padding:13px 16px;
  background:rgba(255,255,255,0.8);
  border:1.5px solid var(--border2);
  border-radius:13px;
  color:var(--purple-deep);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:background .2s,border-color .2s;
}
.btn-google:hover{background:rgba(255,255,255,1);border-color:var(--purple);}
.btn-google:disabled{opacity:.5;cursor:not-allowed;}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}

/* Toast */
.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--purple-deep);
  border:1.5px solid rgba(250,217,79,0.3);
  border-radius:12px;
  padding:12px 22px;
  font-size:13px;
  font-weight:600;
  color:var(--yellow);
  opacity:0;
  transition:all .35s;
  pointer-events:none;
  white-space:nowrap;
  box-shadow:0 8px 32px rgba(59,13,138,0.4);
  z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#7f1d1d;border-color:rgba(220,38,38,0.4);color:#fca5a5;}
.toast.ok{background:var(--purple-deep);color:var(--yellow);}

/* Footer link */
.back-link{
  margin-top:20px;
  font-size:12px;
  color:var(--purple);
  opacity:0.55;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:4px;
  transition:opacity .2s;
}
.back-link:hover{opacity:0.85;}

@media(max-width:480px){
  .card-inner{padding:24px 20px 22px;}
  .card{border-radius:22px;}
}
</style>
</head>

var SB_URL = 'https://ttuxfivcwdpyvhmybbna.supabase.co';

window.addEventListener('load', async function() {

});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i===0 && tab==='giris') || (i===1 && tab==='kayit'));
  });
  document.getElementById('formGiris').classList.toggle('active', tab==='giris');
  document.getElementById('formKayit').classList.toggle('active', tab==='kayit');
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = 'toast show ' + (type || 'ok');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function setLoading(id, on, label) {
  var b = document.getElementById(id);
  b.disabled = on;
  b.innerHTML = on ? '<span class="spinner"></span>Y&uuml;kleniyor...' : label;
}

function togglePass(id, btn) {
  var inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '&#128065;' : '&#128584;';
}

function checkStrength(val) {
  var bars = [document.getElementById('sb1'),document.getElementById('sb2'),document.getElementById('sb3'),document.getElementById('sb4')];
  bars.forEach(function(b){ b.className=''; });
  var s = 0;
  if (val.length >= 6)  s++;
  if (val.length >= 10) s++;
  if (/[A-Z]/.test(val) && /[0-9]/.test(val)) s++;
  if (/[^A-Za-z0-9]/.test(val)) s++;
  var cls = s <= 1 ? 'sb-weak' : s <= 2 ? 'sb-med' : 'sb-strong';
  var lbls = { 'sb-weak':'Zay&#305;f &#128556;', 'sb-med':'Orta &#128077;', 'sb-strong':'G&uuml;&#231;l&uuml; &#128170;' };
  var colors = { 'sb-weak':'#dc2626', 'sb-med':'#d97706', 'sb-strong':'#16a34a' };
  for (var i = 0; i < s; i++) bars[i].className = cls;
  var lbl = document.getElementById('strengthLbl');
  lbl.innerHTML = val.length > 0 ? lbls[cls] : '';
  lbl.style.color = colors[cls] || '';
}

async function loginWithGoogle() {
  var btns = document.querySelectorAll('.btn-google');
  btns.forEach(function(b){ b.disabled = true; b.style.opacity = '.5'; });
  try {
    var res = await _sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (res.error) {
      toast('Google giri&#351;i ba&#351;ar&#305;s&#305;z: ' + res.error.message, 'err');
      btns.forEach(function(b){ b.disabled = false; b.style.opacity = ''; });
    }
  } catch(e) {
    toast('Ba&#287;lant&#305; hatas&#305;.', 'err');
    btns.forEach(function(b){ b.disabled = false; b.style.opacity = ''; });
  }
}

async function login() {
  var email = document.getElementById('girisEmail').value.trim();
  var pass  = document.getElementById('girisPass').value;
  if (!email || !pass) return toast('L&uuml;tfen t&uuml;m alanlar&#305; doldurun.', 'err');
  setLoading('girisBtn', true, 'Giri&#351; Yap &#10022;');
  try {
    var res  = await fetch(SB_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email) + '&password=eq.' + encodeURIComponent(pass) + '&select=*', { headers: H });
    var data = await res.json();
    if (!data || !data.length) {
      toast('E-posta veya &#351;ifre hatal&#305;.', 'err');
    } else {
      localStorage.setItem('pass_user', JSON.stringify(data[0]));
      toast('Ho&#351; geldin, ' + data[0].name.split(' ')[0] + '! &#10022;', 'ok');
      setTimeout(function(){ location.href = 'pass-dashboard.html'; }, 1000);
    }
  } catch(e) { toast('Ba&#287;lant&#305; hatas&#305;.', 'err'); }
  setLoading('girisBtn', false, 'Giri&#351; Yap &#10022;');
}

async function register() {
  var name  = document.getElementById('kayitAd').value.trim();
  var email = document.getElementById('kayitEmail').value.trim();
  var pass  = document.getElementById('kayitPass').value;
  var uname = document.getElementById('kayitUsername').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
  var terms = document.getElementById('termsCheck').checked;

  if (!name || !email || !pass || !uname) return toast('L&uuml;tfen t&uuml;m alanlar&#305; doldurun.', 'err');
  if (uname.length < 3) return toast('Kullan&#305;c&#305; ad&#305; en az 3 karakter olmal&#305;.', 'err');
  if (!terms) {
    document.getElementById('termsErr').classList.add('show');
    return toast('Kullan&#305;m ko&#351;ullar&#305;n&#305; kabul etmelisiniz.', 'err');
  }
  if (pass.length < 6) return toast('&#350;ifre en az 6 karakter olmal&#305;.', 'err');

  document.getElementById('termsErr').classList.remove('show');
  setLoading('kayitBtn', true, 'Hesap Olu&#351;tur &#10022;');
  try {
    var chk = await fetch(SB_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email) + '&select=id', { headers: H });
    var exist = await chk.json();
    if (exist && exist.length) {
      toast('Bu e-posta zaten kay&#305;tl&#305;.', 'err');
      setLoading('kayitBtn', false, 'Hesap Olu&#351;tur &#10022;');
      return;
    }
    var uchk = await fetch(SB_URL + '/rest/v1/users?username=eq.' + encodeURIComponent(uname) + '&select=id', { headers: H });
    var uexist = await uchk.json();
    if (uexist && uexist.length) {
      toast('@' + uname + ' kullan&#305;c&#305; ad&#305; al&#305;nm&#305;&#351;!', 'err');
      setLoading('kayitBtn', false, 'Hesap Olu&#351;tur &#10022;');
      return;
    }
    var res = await fetch(SB_URL + '/rest/v1/users', {
      method: 'POST',
      headers: Object.assign({}, H, { 'Prefer': 'return=representation' }),
      body: JSON.stringify({ name: name, email: email, password: pass, username: uname })
    });
    var data = await res.json();
    if (data && data[0]) {
      localStorage.setItem('pass_user', JSON.stringify(data[0]));
      toast('Hesap olu&#351;turuldu! &#127881;', 'ok');
      setTimeout(function(){ location.href = 'pass-dashboard.html'; }, 1000);
    } else {
      toast('Bir hata olu&#351;tu. Tekrar dene.', 'err');
    }
  } catch(e) { toast('Ba&#287;lant&#305; hatas&#305;.', 'err'); }
  setLoading('kayitBtn', false, 'Hesap Olu&#351;tur &#10022;');
}

function showBadge(u) {
  document.getElementById('authArea').style.display = 'none';
  document.getElementById('badgeWrap').classList.add('show');
  var av = document.getElementById('badgeAv');
  if (u.avatar_url) {
    av.innerHTML = '<img src="' + u.avatar_url + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"/>';
    av.style.background = 'transparent';
  } else if (u.avatarEmoji) {
    av.textContent = u.avatarEmoji;
    av.style.background = 'var(--purple-light)';
    av.style.fontSize = '36px';
  } else {
    av.textContent = u.name[0].toUpperCase();
    if (u.avatarBg) av.style.background = u.avatarBg;
  }
  document.getElementById('badgeName').textContent  = u.name;
  document.getElementById('badgeEmail').textContent = u.email;
}

async function logout() {
  await _sb.auth.signOut();
  localStorage.removeItem('pass_user');
  document.getElementById('badgeWrap').classList.remove('show');
  document.getElementById('authArea').style.display = 'block';
  document.getElementById('girisEmail').value = '';
  document.getElementById('girisPass').value  = '';
  switchTab('giris');
  toast('&#199;&#305;k&#305;&#351; yap&#305;ld&#305;.', 'ok');
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formGiris').classList.contains('active')) login();
  else if (document.getElementById('formKayit').classList.contains('active')) register();
});

document.getElementById('termsCheck').addEventListener('change', function() {
  if (this.checked) document.getElementById('termsErr').classList.remove('show');
});
</script>
